<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bookfuckerz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
 <style>
  body {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    background: #f4efe6;
    color: #3b2f2f;
    padding: 15px;
  }

  h1 {
    text-align: center;
    margin-bottom: 5px;
    font-size: 2em;
  }

  p.subtitle {
    text-align: center;
    margin-top: 0;
    font-style: italic;
    color: #6b5b53;
  }

  table {
    width: 66%;
    margin: 20px auto;
    border-collapse: collapse;
    background: #fffdf8;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    border-radius: 8px;
    overflow: hidden;
  }

  th, td {
    padding: 12px;
    border-bottom: 1px solid #e6ded3;
    text-align: center;
    font-size: 1.05em;
  }

  th {
    background: #5c4033;
    color: white;
    font-weight: normal;
  }

  tr:nth-child(even) { background: #f9f4ec; }

  .reader-cell {
    text-align: center;
    font-weight: bold;
  }

  .book-cell {
    text-align: center;
    min-width: 260px;
  }

  .book-title {
    font-style: italic;
  }

  @media (max-width: 600px) {
    table {
      width: 95%;
      font-size: 0.95em;
    }

    th, td {
      padding: 10px 6px;
    }

    .book-cell {
      min-width: auto;
    }
  }
</style>

<body>

<h1>📚 Bookfuckerz</h1>
<p class="subtitle">Who’s turning the most pages?</p>

<table id="scoreboard"></table>

<script>
const scoreboardUrl =
  "https://opensheet.elk.sh/1nwnbwGOc99BVsed4doQZvNfPgkNwC6bVA3FlXrLLHgg/Scoreboard";

const booksUrl =
  "https://opensheet.elk.sh/1nwnbwGOc99BVsed4doQZvNfPgkNwC6bVA3FlXrLLHgg/Books!";

function parseScore(val) {
  return parseFloat(String(val).replace(/,/g, "")) || 0;
}

function getMedal(i) {
  return ["🥇","🥈","🥉"][i] || "";
}

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getLatestBooks(books) {
  const latest = {};

  books.forEach(book => {
    const reader = book["Who are you?"];
    if (!reader) return;

    const timestamp = new Date(book["Timestamp"]);

    if (!latest[reader] || timestamp > latest[reader].timestamp) {
      latest[reader] = {
        timestamp,
        title: book["Title"] || "",
        author: book["Author"] || ""
      };
    }
  });

  return latest;
}

async function loadScoreboard() {
  const table = document.getElementById("scoreboard");
  table.innerHTML = "<tr><td>Loading…</td></tr>";

  try {
    const [scoreboardRes, booksRes] = await Promise.all([
      fetch(scoreboardUrl),
      fetch(booksUrl)
    ]);

    const scoreboard = await scoreboardRes.json();
    const books = await booksRes.json();

    const latestBooks = getLatestBooks(books);

    const headers = Object.keys(scoreboard[0]);

    const nameCol =
      headers.find(h => h.toLowerCase().includes("reader")) ||
      headers[0];

    const scoreCol =
      headers.find(h => h.toLowerCase().includes("score")) ||
      headers[1];

    scoreboard.sort(
      (a, b) =>
        parseScore(b[scoreCol]) - parseScore(a[scoreCol])
    );

    let html = "<thead><tr>";

    headers.forEach(h => {
      html += `<th>${h}</th>`;
    });

    html += "<th>Latest Book</th>";
    html += "</tr></thead><tbody>";

    scoreboard.forEach((row, i) => {
      const reader = row[nameCol];

      html += "<tr>";

      headers.forEach(h => {
        let value = row[h] ?? "";

        if (h === nameCol) {
          value = `${getMedal(i)} ${value}`;
          html += `<td class="reader-cell">${value}</td>`;
        } else {
          html += `<td>${value}</td>`;
        }
      });

      const latest = latestBooks[reader];

      if (latest) {
        html += `
          <td class="book-cell">
            <span class="book-title">${escapeHtml(latest.title)}</span>
            by ${escapeHtml(latest.author)}
          </td>
        `;
      } else {
        html += `<td class="book-cell">—</td>`;
      }

      html += "</tr>";
    });

    html += "</tbody>";
    table.innerHTML = html;

  } catch (err) {
    table.innerHTML = "<tr><td>Error loading scoreboard</td></tr>";
    console.error(err);
  }
}

loadScoreboard();
setInterval(loadScoreboard, 30000);
</script>

<p style="text-align:center; margin-top:30px; font-size:1.1em; font-style:italic;">
  <a href="https://github.com/ben-foley/bookfuckerz/issues/new?template=feature_request.md"
     target="_blank"
     style="text-decoration:none; color:#5c4033; display:inline-flex; align-items:center; gap:6px; font-style:italic;">

      <path d="M2 6a6 6 0 1 1 12 0c0 2.1-1.22 3.875-3 5v1a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-1c-1.78-1.125-3-2.9-3-5z"/>
      <path d="M7 13h2v1H7v-1z"/>
      <path d="M6 14h4v1H6v-1z"/>
    </svg>
    Request new features here!
  </a>
</p>

</body>
</html>
